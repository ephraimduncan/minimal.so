<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minimal</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          sans-serif;
        width: 280px;
        background: #fff;
        color: #1a1a1a;
      }

      .container {
        padding: 16px;
      }

      .header {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 16px;
      }

      .header img {
        width: 20px;
        height: 20px;
      }

      .header h1 {
        font-size: 14px;
        font-weight: 600;
      }

      .status {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 12px;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 500;
        margin-bottom: 8px;
      }

      .status.saved {
        background: #f0fdf4;
        color: #16a34a;
      }

      .status.saved .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #22c55e;
        flex-shrink: 0;
      }

      button {
        width: 100%;
        padding: 10px 12px;
        font-size: 13px;
        font-weight: 500;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: background 0.15s, opacity 0.15s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
      }

      button:disabled {
        opacity: 0.5;
        cursor: default;
      }

      .btn-primary {
        background: #1a1a1a;
        color: #fff;
        margin-bottom: 8px;
      }

      .btn-primary:hover:not(:disabled) {
        background: #333;
      }

      .btn-secondary {
        background: #f5f5f5;
        color: #1a1a1a;
      }

      .btn-secondary:hover:not(:disabled) {
        background: #eee;
      }

      .loading {
        text-align: center;
        padding: 20px;
        font-size: 13px;
        color: #888;
      }

      .feedback {
        text-align: center;
        font-size: 12px;
        color: #888;
        margin-top: 8px;
        min-height: 16px;
      }

      .feedback.success {
        color: #16a34a;
      }

      .feedback.error {
        color: #ef4444;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <img src="icons/icon48.png" alt="" />
        <h1>Minimal</h1>
      </div>

      <div id="loading" class="loading">Checking...</div>

      <div id="content" style="display: none">
        <div id="current-tab-section"></div>
        <div id="all-tabs-section"></div>
        <div id="feedback" class="feedback"></div>
      </div>
    </div>

    <script src="constants.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
